<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페르시아어 단어장</title>
    
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/sahel-font@v3.4.0/dist/font-face.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #0b2a4a;
            --accent: #fa5252;
            --bg: #e9ecef;
            --card: #ffffff;
            --persian-font: 'Vazirmatn', 'Sahel', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* 글로벌 로딩 스크린 */
        #global-loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .container { width: 100%; max-width: 1200px; min-height: 750px; background: var(--card); border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); position: relative; overflow: hidden; display: flex; flex-direction: column; transition: 0.2s; }
        
        @keyframes damageFlash {
            0% { box-shadow: inset 0 0 0px 0px rgba(250, 82, 82, 0); }
            50% { box-shadow: inset 0 0 80px 15px rgba(250, 82, 82, 0.4); }
            100% { box-shadow: inset 0 0 0px 0px rgba(250, 82, 82, 0); }
        }
        .damage-effect { animation: damageFlash 0.5s ease-out; }

        .top-nav { display: none; background: #f8f9fa; padding: 20px 30px; border-bottom: 2px solid #e9ecef; display: flex; justify-content: space-between; align-items: center; }
        .btn-home { background: #ffffff; border: 2px solid #dee2e6; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; color: var(--primary); font-size: 1.1rem; }
        .btn-home:hover { background: #e9ecef; border-color: #adb5bd; }
        
        /* 음소거 버튼 스타일 */
        #btn-mute { width: 45px; padding: 10px 0; text-align: center; }

        header { background: var(--primary); color: white; padding: 25px; text-align: center; }
        header h2 { font-size: 2.5rem; margin: 0; }
        header p { margin-top: 15px; opacity: 0.8; font-size: 1.2rem; }

        .screen { display: none; padding: 40px 50px; flex-grow: 1; overflow-y: auto; max-height: calc(100vh - 150px); }
        .screen.active { display: block; }

        .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 30px; width: 100%; }
        @media (max-width: 768px) { .home-grid { grid-template-columns: 1fr; } }
        
        .mode-card { background: #f8f9fa; border: 2px solid #e9ecef; border-radius: 12px; padding: 35px 20px; text-align: center; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; justify-content: center; }
        .mode-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(11, 42, 74, 0.1); }
        .mode-icon { font-size: 3.5rem; color: var(--primary); margin-bottom: 20px; }
        .mode-card h3 { font-size: 1.5rem; margin-bottom: 15px; color: var(--primary); }
        .mode-card p { font-size: 1.05rem; color: #666; word-break: keep-all; }

        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; font-weight: bold; font-size: 1.5rem; padding-bottom: 15px; border-bottom: 2px solid #f1f3f5; }
        
        /* 모드 선택 버튼 분리 */
        .btn-group { display: flex; gap: 15px; margin-top: 40px; }
        .btn-start { flex: 1; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.4rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-start:hover { background: #081e36; transform: translateY(-2px); }
        .btn-extreme { flex: 1; padding: 20px; background: #8b0000; color: white; border: none; border-radius: 8px; font-size: 1.4rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-extreme:hover { background: #5a0000; transform: translateY(-2px); }

        .mcq-problem { font-family: var(--persian-font); font-size: 3.5rem; text-align: center; margin: 40px 0; font-weight: bold; color: var(--primary); }
        .mcq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .mcq-btn { font-family: var(--persian-font); font-size: 1.8rem; padding: 25px; background: #fff; border: 3px solid #dee2e6; border-radius: 12px; cursor: pointer; transition: 0.1s; font-weight: bold; color: #495057; }
        .mcq-btn:hover { border-color: var(--primary); background: #f8f9fa; transform: scale(1.02); color: var(--primary); }
        .mcq-btn.wrong { border-color: var(--accent); background: #fff5f5; animation: shake 0.4s; color: var(--accent); }

        .match-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        @media (max-width: 600px) { .match-grid { grid-template-columns: repeat(3, 1fr); } }
        .match-card { background: white; border: 3px solid #dee2e6; border-radius: 12px; height: 100px; display: flex; justify-content: center; align-items: center; font-size: 1.6rem; font-family: var(--persian-font); font-weight: bold; cursor: pointer; transition: 0.2s; text-align: center; padding: 10px; user-select: none; }
        .match-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-color: #adb5bd; }
        .match-card.selected { border-color: var(--primary); background: #e3f2fd; color: var(--primary); transform: scale(1.05); }
        .match-card.matched { visibility: hidden; opacity: 0; pointer-events: none; }
        .match-card.wrong { border-color: var(--accent); background: #ffe3e3; color: var(--accent); animation: shake 0.4s; }

        .scramble-mean { font-size: 2.5rem; text-align: center; margin: 30px 0 10px 0; font-weight: bold; color: var(--primary); }
        .scramble-input-area { min-height: 80px; background: #f8f9fa; border: 3px dashed #ced4da; border-radius: 12px; display: flex; justify-content: center; align-items: center; margin-bottom: 30px; padding: 10px; gap: 5px; font-family: var(--persian-font); font-size: 3rem; color: var(--primary); direction: rtl; }
        .scramble-letters { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; direction: rtl; }
        .letter-btn { width: 60px; height: 60px; font-family: var(--persian-font); font-size: 2rem; font-weight: bold; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 12px; cursor: pointer; transition: 0.1s; display: flex; justify-content: center; align-items: center; }
        .letter-btn:hover { background: var(--primary); color: white; transform: translateY(-3px); }
        .letter-btn.used { opacity: 0.3; pointer-events: none; transform: scale(0.9); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .vocab-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 20px; }
        .vocab-controls { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .vocab-count { font-weight: bold; color: var(--primary); font-size: 1.05rem; white-space: nowrap; }
        
        .search-bar { padding: 10px 18px; width: 100%; max-width: 450px; border: 2px solid #ced4da; border-radius: 8px; font-size: 1.05rem; outline: none; }
        .search-bar:focus { border-color: var(--primary); }

        .btn-control { padding: 8px 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        .btn-shuffle { background: #ffc107; color: #000; }
        .btn-shuffle:hover { background: #fab005; }
        .btn-download { background: #e9ecef; color: #495057; border: 1px solid #ced4da; }
        .btn-download:hover { background: #dee2e6; }

        .vocab-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .vocab-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; font-size: 1.2rem; transition: 0.2s; }
        .vocab-item:hover { background: #e3f2fd; border-color: var(--primary); transform: translateX(5px); }
        .vocab-per { font-family: var(--persian-font); font-size: 1.8rem; font-weight: bold; color: var(--primary); }
        .vocab-kor { font-size: 1.1rem; color: #495057; font-weight: bold; }

        .loading-view { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px; color: var(--primary); font-weight: bold; font-size: 1.2rem; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }

        .flashcard { width: 80%; max-width: 600px; height: 50vh; min-height: 350px; background: white; border-radius: 20px; cursor: pointer; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .fc-top { flex: 6; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 2px dashed #e9ecef; padding: 20px; text-align: center; }
        .fc-bottom { flex: 4; display: flex; justify-content: center; align-items: center; background: #f8f9fa; border-radius: 0 0 20px 20px; padding: 20px; text-align: center; }
        .fc-content-hidden { display: none !important; } 
        
        .card-per { font-family: var(--persian-font); font-size: 5rem; color: var(--primary); line-height: 1.2; }
        .card-pron { font-size: 1.3rem; color: #868e96; margin-top: 10px; font-family: sans-serif; }
        .card-mean { font-size: 2.2rem; font-weight: bold; color: var(--accent); }
        
        .card-controls { position: absolute; bottom: -70px; width: 100%; display: flex; justify-content: center; gap: 50px; }
        .card-btn { background: white; border: none; font-size: 1.6rem; cursor: pointer; width: 60px; height: 60px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.2s; color: var(--primary); display:flex; justify-content:center; align-items:center; }
        .card-btn:hover { background: #e3f2fd; transform: scale(1.1); }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 2rem; cursor: pointer; border:none; background:none; color: #adb5bd; transition: 0.2s; }
        .close-modal:hover { color: var(--accent); }

        /* 결과 및 인증서 익스트림 디자인 추가 */
        #certificate { background: #fff; padding: 40px; border: 8px solid var(--primary); border-radius: 16px; text-align: center; position: relative; margin-bottom: 30px; overflow: hidden;}
        #certificate.extreme-mode { border-color: #8b0000; background: #fffdfd; }
        #certificate.extreme-mode::before {
            content: 'EXTREME MODE'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 6rem; color: rgba(250, 82, 82, 0.08); pointer-events: none;
            white-space: nowrap; font-weight: bold; letter-spacing: 5px;
        }

        .cert-title { font-size: 2rem; color: var(--primary); margin-bottom: 15px; border-bottom: 2px dashed #ccc; padding-bottom: 15px; font-weight: bold; }
        .extreme-mode .cert-title { color: #8b0000; border-bottom-color: #eebfbf; }
        .cert-rank { font-size: 5rem; font-weight: bold; color: var(--accent); margin: 20px 0; text-shadow: 2px 2px 0px #ffe3e3; position: relative; z-index: 1;}
        .extreme-mode .cert-rank { color: #8b0000; text-shadow: 2px 2px 0px #ffd0d0; }
        .cert-msg { font-size: 1.3rem; color: #555; margin-bottom: 15px; font-weight: bold; position: relative; z-index: 1;}
        .cert-accuracy { font-size: 1.2rem; color: #087f5b; margin-bottom: 30px; font-weight: bold; position: relative; z-index: 1;}
        .cert-stamp { position: absolute; bottom: 20px; right: 25px; font-size: 1rem; color: #888; text-align: right; }
        
        .mistake-area { text-align: left; background: #f8f9fa; padding: 25px; border-radius: 12px; max-height: 250px; overflow-y: auto; border: 1px solid #dee2e6; margin-bottom: 20px; }
        .mistake-item { border-bottom: 1px dashed #ccc; padding: 15px 0; font-size: 1.2rem; color: var(--accent); }
        .mistake-item:last-child { border-bottom: none; }
        .mistake-item span { color: #0b2a4a; margin-right: 15px; display: inline-block; font-family: var(--persian-font); font-weight: bold; font-size: 1.4rem; }

        .btn-share { width: 100%; padding: 18px; background: #20c997; color: white; border: none; border-radius: 8px; font-size: 1.3rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-share:hover { background: #12b886; }

        .portal-home-button { position: fixed; top: 25px; left: 25px; width: 50px; height: 50px; background-color: var(--primary); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 10000; transition: all 0.3s ease; }
        .portal-home-button:hover { background-color: #1a3a5a; transform: scale(1.1); box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
        
        /* 모드 배지 스타일 */
        .mode-badge { display: inline-block; padding: 3px 10px; border-radius: 5px; font-size: 1rem; font-weight: bold; vertical-align: middle; margin-left: 10px;}
        .badge-normal { background: #e3f2fd; color: #0b2a4a; }
        .badge-extreme { background: #ffe3e3; color: #8b0000; }
    </style>
</head>
<body>

<div id="global-loading">
    <div class="spinner"></div>
    <h2 style="margin-top:20px; color:var(--primary);">단어장 데이터 연동 중...</h2>
</div>

<a href="index.html" class="portal-home-button" title="메인 페이지로 돌아가기">
    <i class="fas fa-home"></i>
</a>

<div class="container" id="main-container">
    <div class="top-nav" id="top-nav" style="display: none;">
        <button class="btn-home" onclick="goHome()"><i class="fas fa-arrow-left"></i> 뒤로가기</button>
        <button class="btn-home" id="btn-mute" onclick="toggleMute()" title="음소거"><i class="fas fa-volume-up"></i></button>
    </div>

    <header id="main-header">
        <h2>페르시아어 단어장</h2>
        <p>게임으로 완벽하게 체화하는 단어 학습 공간</p>
    </header>

    <div id="screen-home" class="screen active">
        <div class="home-grid">
            <div class="mode-card" onclick="showOnboarding('mcq')">
                <i class="fas fa-tasks mode-icon"></i>
                <h3>객관식 서바이벌</h3>
                <p>양방향(FA↔KO) 뜻 맞추기</p>
            </div>
            <div class="mode-card" onclick="showOnboarding('match')">
                <i class="fas fa-clone mode-icon"></i>
                <h3>스피드 매치</h3>
                <p>단어와 뜻의 짝을 빠르게 맞추기</p>
            </div>
            <div class="mode-card" onclick="showOnboarding('scramble')">
                <i class="fas fa-font mode-icon"></i>
                <h3>단어 스크램블</h3>
                <p>조각난 철자를 순서대로 조립하기</p>
            </div>
            <div class="mode-card" onclick="showScreen('screen-dict');">
                <i class="fas fa-book mode-icon"></i>
                <h3>단어 목록</h3>
                <p>전체 단어 리스트 열람 및 검색</p>
            </div>
        </div>
    </div>

    <div id="screen-onboarding" class="screen">
        <h3 id="ob-title" style="font-size: 2rem; color: var(--primary); margin-bottom: 25px;"></h3>
        <div id="ob-desc" style="font-size: 1.2rem; line-height: 1.8; background: #f8f9fa; padding: 35px; border-radius: 12px; border-left: 6px solid var(--primary);"></div>
        <div class="btn-group">
            <button class="btn-start" onclick="startGame('normal')">일반 모드 시작</button>
            <button class="btn-extreme" onclick="startGame('extreme')">익스트림 모드 시작</button>
        </div>
    </div>

    <div id="screen-dict" class="screen">
        <div class="vocab-header">
            <input type="text" id="searchInput" class="search-bar" placeholder="단어 또는 뜻 검색" oninput="filterDict()">
            
            <div class="vocab-controls">
                <div class="vocab-count">단어 사전: <span id="dict-count">0</span>개</div>
                <button class="btn-control btn-shuffle" onclick="shuffleDict()"><i class="fas fa-random"></i> 단어 섞기</button>
                <button class="btn-control btn-download" onclick="downloadCSV()"><i class="fas fa-download"></i> 단어 다운로드</button>
            </div>
        </div>
        <div class="vocab-list" id="dict-list"></div>
    </div>

    <div id="screen-mcq" class="screen">
        <div class="game-header">
            <div>진행도: <span id="mcq-progress"></span></div>
            <div>타이머: <span id="mcq-timer" style="color:var(--primary); transition: 0.3s;">00:00</span></div>
        </div>
        <div class="mcq-problem" id="mcq-prob-text"></div>
        <div class="mcq-grid" id="mcq-buttons">
            <button class="mcq-btn" onclick="checkMCQ(0)"></button>
            <button class="mcq-btn" onclick="checkMCQ(1)"></button>
            <button class="mcq-btn" onclick="checkMCQ(2)"></button>
            <button class="mcq-btn" onclick="checkMCQ(3)"></button>
        </div>
    </div>

    <div id="screen-match" class="screen">
        <div class="game-header">
            <div>라운드: <span id="match-round" style="color:var(--primary);"></span></div>
            <div>남은 시간: <span id="match-timer" style="color:var(--accent);"></span>초</div>
        </div>
        <div class="match-grid" id="match-board"></div>
    </div>

    <div id="screen-scramble" class="screen">
        <div class="game-header">
            <div>진행도: <span id="scramble-progress"></span></div>
            <div>콤보: <span id="scramble-combo" style="color:#f59f00;">0</span></div>
        </div>
        <div class="scramble-mean" id="scramble-mean-text"></div>
        <div class="scramble-input-area" id="scramble-input"></div>
        <div class="scramble-letters" id="scramble-board"></div>
    </div>

    <div id="flashcardModal" class="modal-overlay" style="z-index: 10001;">
        <div style="position:relative; width:100%; display:flex; justify-content:center;">
            <div class="flashcard" id="fcContainer" onclick="toggleCard()">
                <button class="close-modal" onclick="event.stopPropagation(); closeFlashcard()"><i class="fas fa-times"></i></button>
                <div class="fc-top">
                    <div class="card-per" id="fcPer"></div>
                    <div class="card-pron" id="fcPron"></div>
                </div>
                <div class="fc-bottom">
                    <div class="card-mean fc-content-hidden" id="fcMean"></div>
                </div>
            </div>
            <div class="card-controls">
                <button class="card-btn" onclick="event.stopPropagation(); prevCard()"><i class="fas fa-chevron-left"></i></button>
                <button class="card-btn" onclick="event.stopPropagation(); nextCard()"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <div id="certificate">
            <div class="cert-title">페르시아어 단어 검정 인증서 <span id="res-badge" class="mode-badge"></span></div>
            <div id="res-mode" style="font-size:1.5rem; font-weight:bold; color:#666; margin-top: 10px;"></div>
            <div class="cert-rank" id="res-rank"></div>
            <div class="cert-msg" id="res-msg"></div>
            <div class="cert-accuracy" id="res-acc"></div>
            <div style="font-size: 1.5rem; margin-bottom: 10px;">기록: <strong id="res-score" style="color:var(--primary);"></strong></div>
            <div class="cert-stamp" id="res-stamp"></div>
        </div>
        
        <div id="mistake-area" class="mistake-area" style="display:none;">
            <h4 style="margin-bottom: 15px; font-size:1.4rem; color:var(--primary);"><i class="fas fa-book-open"></i> 오답 노트</h4>
            <div id="mistake-list"></div>
        </div>

        <button class="btn-share" onclick="copyResultImage()"><i class="fas fa-camera"></i> 인증서 복사하기 (클립보드)</button>
    </div>
</div>

<script>
    const WORD_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7kygc158HJLii5s2jwGoCPNhNRyIoK0GJVM6oZUBMyfbI0FIi7lYd0XN4N6v2PYGxtq22AsBZ6yFX/pub?gid=415354578&single=true&output=csv"; 
    
    // 오디오 및 음소거 설정
    let audioCtx;
    let isMuted = false;

    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    
    function toggleMute() {
        isMuted = !isMuted;
        document.getElementById('btn-mute').innerHTML = isMuted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
    }

    function playTick() {
        if(!audioCtx || isMuted) return;
        let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime); 
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }
    function playBuzz() {
        if(!audioCtx || isMuted) return;
        let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); 
        gain.gain.setValueAtTime(0.6, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }

    let wordData = [];

    function parseCSV(str) {
        const arr = []; let quote = false;
        for (let row = 0, col = 0, c = 0; c < str.length; c++) {
            let cc = str[c], nc = str[c+1];
            arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
            if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
            if (cc == '"') { quote = !quote; continue; }
            if (cc == ',' && !quote) { ++col; continue; }
            if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
            if (cc == '\n' && !quote) { ++row; col = 0; continue; }
            if (cc == '\r' && !quote) { ++row; col = 0; continue; }
            arr[row][col] += cc;
        }
        return arr;
    }

    // 로딩 숨기기 헬퍼 함수
    function hideGlobalLoading() {
        document.getElementById('global-loading').style.display = 'none';
    }

    window.onload = function() {
        if(WORD_CSV_URL) {
            fetch(WORD_CSV_URL).then(res => res.text()).then(csvText => {
                const parsed = parseCSV(csvText);
                if(parsed.length > 1) {
                    wordData = [];
                    for(let i=1; i<parsed.length; i++) {
                        if(parsed[i][0]) {
                            wordData.push({ 
                                p: parsed[i][0].trim(), 
                                k: parsed[i][1] ? parsed[i][1].trim() : '',
                                r: parsed[i][2] ? parsed[i][2].trim() : '' 
                            });
                        }
                    }
                    renderDict();
                }
            }).catch(e => {
                alert("단어 데이터를 가져오지 못했습니다. 링크를 확인하세요.");
            }).finally(() => {
                hideGlobalLoading();
            });
        } else {
            // URL이 비어있을 경우 무한 로딩 방지 (데모용)
            hideGlobalLoading();
        }
    };

    let currentMode = '';
    let gameDifficulty = 'normal'; // 'normal' | 'extreme'
    let timerInterval = null;
    let startTime = 0;
    let mistakes = []; 

    function getFormattedDate() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const h = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');
        return `${y}.${m}.${d} ${h}:${min}`;
    }

        } else if (mode === 'match') {
            titleEl.innerHTML = '<i class="fas fa-clone"></i> 스피드 매치';

            descEl.innerHTML = `- <strong>일반 모드:</strong> 15문제<br>- <strong>익스트림:</strong> 30문제<br>- <strong>공통 규칙:</strong> 철자 조립. 오답 클릭 시 입력창 리셋 및 콤보 초기화. 철자 선택 하나하나가 정확도에 반영됩니다.`;
        }
        showScreen('screen-onboarding');

    function startGame(difficulty) {
        gameDifficulty = difficulty;
        mistakes = [];
        if (currentMode === 'mcq') startMCQ();
        else if (currentMode === 'match') startMatch();
        else if (currentMode === 'scramble') startScramble();
    }

    function triggerDamageEffect() {
        let container = document.getElementById('main-container');
        container.classList.add('damage-effect');
        setTimeout(() => container.classList.remove('damage-effect'), 500);
    }

    // ==========================================
    // 1. 객관식 서바이벌
    // ==========================================
    let mcqStep = 0, mcqTotal = 30, mcqPenaltySec = 0, mcqClicks = 0;
    let mcqCurrentAnsIdx = -1;
    let currentWordObj = null;

    function startMCQ() {
        mcqTotal = gameDifficulty === 'extreme' ? 100 : 30;
        mcqStep = 0; mcqPenaltySec = 0; mcqClicks = 0;
        showScreen('screen-mcq');
        document.getElementById('mcq-timer').style.color = 'var(--primary)';
        startTime = Date.now();
        timerInterval = setInterval(() => {
            let sec = Math.floor((Date.now() - startTime) / 1000) + mcqPenaltySec;
            document.getElementById('mcq-timer').innerText = `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
        }, 1000);
        nextMCQ();
    }

    function nextMCQ() {
        mcqStep++;
        if (mcqStep > mcqTotal) return endMCQ();
        
        document.getElementById('mcq-progress').innerText = `${mcqStep} / ${mcqTotal}`;
        let isFaToKo = mcqStep <= (mcqTotal / 2); 
        
        let shuffledData = [...wordData].sort(() => 0.5 - Math.random());
        currentWordObj = shuffledData[0];
        let opts = [currentWordObj];
        for(let i=1; i<4; i++) {
            // 풀이 적을 때를 대비한 안전장치 (중복 허용)
            opts.push(shuffledData[i % shuffledData.length]); 
        }
        opts.sort(() => 0.5 - Math.random());

        document.getElementById('mcq-prob-text').innerText = isFaToKo ? currentWordObj.p : currentWordObj.k;
        document.getElementById('mcq-prob-text').style.direction = isFaToKo ? 'rtl' : 'ltr';

        let btns = document.querySelectorAll('.mcq-btn');
        btns.forEach((btn, idx) => {
            btn.innerText = isFaToKo ? opts[idx].k : opts[idx].p;
            btn.style.direction = isFaToKo ? 'ltr' : 'rtl';
            if (opts[idx].p === currentWordObj.p) mcqCurrentAnsIdx = idx;
        });
    }

    function checkMCQ(idx) {
        mcqClicks++;
        let btn = document.querySelectorAll('.mcq-btn')[idx];
        if (idx === mcqCurrentAnsIdx) {
            playTick();
            nextMCQ();
        } else {
            playBuzz();
            mcqPenaltySec += 5;
            triggerDamageEffect();
            btn.classList.add('wrong');
            setTimeout(() => btn.classList.remove('wrong'), 400);
            if(!mistakes.find(m => m.p === currentWordObj.p)) mistakes.push(currentWordObj);
        }
    }

    function endMCQ() {
        clearInterval(timerInterval);
        let totalSec = Math.floor((Date.now() - startTime) / 1000) + mcqPenaltySec;
        let accuracy = Math.floor((mcqTotal / mcqClicks) * 100);
        if(accuracy > 100) accuracy = 100;

        let rank = '';
        if(gameDifficulty === 'extreme') {
            if(accuracy < 80) rank = 'F';
            else if(accuracy >= 95 && totalSec <= 150) rank = 'SSR';
            else if(accuracy >= 90 && totalSec <= 200) rank = 'SR';
            else rank = 'R';
        } else {
            if (accuracy < 70) rank = 'C';
            else if (totalSec <= 90 && accuracy >= 95) rank = 'A+';
            else if (totalSec <= 120 && accuracy >= 85) rank = 'A';
            else rank = 'B';
        }
        
        showResult('객관식 서바이벌', rank, `${Math.floor(totalSec/60)}분 ${String(totalSec%60).padStart(2,'0')}초`, accuracy);
    }

    // ==========================================
    // 2. 스피드 매치
    // ==========================================
    let matchRound = 1, matchTotalRounds = 3, matchTimeLeft = 40, matchPairsLeft = 8;
    let matchTotalScore = 0; 
    let selectedMatchCard = null;
    let matchClicks = 0;
    const extremeTimes = [45, 40, 35, 30, 25, 22, 20];
    const normalTimes = [40, 30, 20];

    function startMatch() {
        matchRound = 1; matchTotalScore = 0; matchClicks = 0;
        matchTotalRounds = gameDifficulty === 'extreme' ? 7 : 3;
        showScreen('screen-match');
        initMatchRound();
    }

    function initMatchRound() {
        if(gameDifficulty === 'extreme') matchTimeLeft = extremeTimes[matchRound - 1];
        else matchTimeLeft = normalTimes[matchRound - 1];
        
        matchPairsLeft = 8; // 16장 셋팅
        selectedMatchCard = null;
        document.getElementById('match-round').innerText = `${matchRound} / ${matchTotalRounds}`;
        document.getElementById('match-timer').innerText = matchTimeLeft;
        
        // 풀 안전장치
        let shuffled = [...wordData].sort(() => 0.5 - Math.random());
        let pool = [];
        for(let i=0; i<8; i++) pool.push(shuffled[i % shuffled.length]);

        let cards = [];
        pool.forEach(w => {
            cards.push({ text: w.p, obj: w, type: 'fa' });
            cards.push({ text: w.k, obj: w, type: 'ko' });
        });
        cards.sort(() => 0.5 - Math.random());

        let board = document.getElementById('match-board');
        board.innerHTML = "";
        cards.forEach((c, idx) => {
            let el = document.createElement('div');
            el.className = 'match-card';
            el.innerText = c.text;
            el.style.direction = c.type === 'fa' ? 'rtl' : 'ltr';
            el.onclick = () => clickMatchCard(el, c);
            board.appendChild(el);
        });

        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            matchTimeLeft--;
            document.getElementById('match-timer').innerText = matchTimeLeft;
            if(matchTimeLeft <= 0) {
                playBuzz();
                clearInterval(timerInterval);
                let acc = calculateMatchAccuracy();
                showResult('스피드 매치', gameDifficulty === 'extreme' ? 'F' : 'C', `실패 (라운드 ${matchRound} 타임오버)`, acc);
            }
        }, 1000);
    }

    function calculateMatchAccuracy() {
        let targetClicks = matchTotalRounds * 16; 
        let accuracy = Math.floor((targetClicks / (matchClicks === 0 ? 1 : matchClicks)) * 100);
        return accuracy > 100 ? 100 : accuracy;
    }

    function clickMatchCard(el, cardData) {
        if(el.classList.contains('matched') || el.classList.contains('selected')) return;
        matchClicks++;

        if(!selectedMatchCard) {
            playTick();
            el.classList.add('selected');
            selectedMatchCard = { el, data: cardData };
        } else {
            if(selectedMatchCard.data.obj.p === cardData.obj.p && selectedMatchCard.data.type !== cardData.type) {
                playTick();
                el.classList.add('matched');
                selectedMatchCard.el.classList.add('matched');
                matchPairsLeft--;
                selectedMatchCard = null;
                
                if(matchPairsLeft === 0) {
                    clearInterval(timerInterval);
                    matchTotalScore += matchTimeLeft;
                    setTimeout(() => {
                        matchRound++;
                        if(matchRound > matchTotalRounds) endMatch();
                        else initMatchRound();
                    }, 500);
                }
            } else {
                playBuzz();
                triggerDamageEffect();
                el.classList.add('wrong');
                selectedMatchCard.el.classList.add('wrong');
                if(!mistakes.find(m => m.p === cardData.obj.p)) mistakes.push(cardData.obj);
                
                let prevEl = selectedMatchCard.el;
                selectedMatchCard = null;
                setTimeout(() => {
                    el.classList.remove('wrong');
                    prevEl.classList.remove('selected', 'wrong');
                }, 400);
            }
        }
    }

    function endMatch() {
        let accuracy = calculateMatchAccuracy();
        let rank = '';
        
        if(gameDifficulty === 'extreme') {
            if(accuracy < 80) rank = 'F';
            else if(accuracy >= 95 && matchTotalScore >= 80) rank = 'SSR';
            else if(accuracy >= 90 && matchTotalScore >= 40) rank = 'SR';
            else rank = 'R';
        } else {
            if (matchTotalScore >= 45 && accuracy >= 90) rank = 'A+';
            else if (matchTotalScore >= 20 && accuracy >= 70) rank = 'A';
            else if (matchTotalScore >= 10) rank = 'B';
            else rank = 'C';
        }
        
        showResult('스피드 매치', rank, `클리어 (누적 보너스: ${matchTotalScore}초)`, accuracy);
    }

    // ==========================================
    // 3. 단어 스크램블
    // ==========================================
    let scrambleStep = 0, scrambleTotal = 15, scrambleScore = 0, scrambleCombo = 0;
    let scrambleTarget = "", scrambleInput = "";
    let validScrambleData = [];
    let scrambleTargetTotalLen = 0, scrambleClicks = 0;

    function startScramble() {
        scrambleTotal = gameDifficulty === 'extreme' ? 30 : 15;
        scrambleStep = 0; scrambleScore = 0; scrambleCombo = 0;
        scrambleTargetTotalLen = 0; scrambleClicks = 0;
        
        validScrambleData = wordData.filter(w => !w.p.includes(' ') && w.p.length <= 10);
        if(validScrambleData.length < 5) validScrambleData = wordData; 

        showScreen('screen-scramble');
        startTime = Date.now();
        nextScramble();
    }

    function nextScramble() {
        scrambleStep++;
        if(scrambleStep > scrambleTotal) return endScramble();
        
        document.getElementById('scramble-progress').innerText = `${scrambleStep} / ${scrambleTotal}`;
        document.getElementById('scramble-combo').innerText = scrambleCombo;
        
        let wObj = validScrambleData[Math.floor(Math.random() * validScrambleData.length)];
        currentWordObj = wObj;
        scrambleTarget = wObj.p;
        scrambleTargetTotalLen += scrambleTarget.length;
        scrambleInput = "";
        
        document.getElementById('scramble-mean-text').innerText = wObj.k;
        document.getElementById('scramble-input').innerText = "";
        
        let chars = Array.from(scrambleTarget);
        chars.sort(() => 0.5 - Math.random());
        
        let board = document.getElementById('scramble-board');
        board.innerHTML = "";
        chars.forEach(ch => {
            let btn = document.createElement('button');
            btn.className = 'letter-btn';
            btn.innerText = ch;
            btn.onclick = () => clickScrambleLetter(btn, ch);
            board.appendChild(btn);
        });
    }

    function clickScrambleLetter(btn, ch) {
        scrambleClicks++;
        let expectedChar = scrambleTarget[scrambleInput.length];
        
        if (ch === expectedChar) {
            playTick();
            scrambleInput += ch;
            btn.classList.add('used');
            document.getElementById('scramble-input').innerText = scrambleInput;
            
            if (scrambleInput === scrambleTarget) {
                scrambleCombo++;
                scrambleScore += 100 + (scrambleCombo * 10);
                setTimeout(nextScramble, 400);
            }
        } else {
            playBuzz();
            triggerDamageEffect();
            scrambleCombo = 0;
            document.getElementById('scramble-combo').innerText = "0";
            if(!mistakes.find(m => m.p === currentWordObj.p)) mistakes.push(currentWordObj);
            
            scrambleInput = "";
            document.getElementById('scramble-input').innerText = "";
            document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('used'));
        }
    }

    function endScramble() {
        let totalSec = Math.floor((Date.now() - startTime) / 1000);
        let accuracy = Math.floor((scrambleTargetTotalLen / (scrambleClicks === 0 ? 1 : scrambleClicks)) * 100);
        if(accuracy > 100) accuracy = 100;

        let rank = '';
        if(gameDifficulty === 'extreme') {
            if(accuracy < 80) rank = 'F';
            else if(accuracy >= 95 && totalSec <= 100) rank = 'SSR';
            else if(accuracy >= 90 && totalSec <= 150) rank = 'SR';
            else rank = 'R';
        } else {
            if (accuracy >= 90 && totalSec <= 60) rank = 'A+';
            else if (accuracy >= 80 && totalSec <= 100) rank = 'A';
            else if (accuracy >= 70) rank = 'B';
            else rank = 'C';
        }
        
        showResult('단어 스크램블', rank, `${scrambleScore} 점 (소요시간: ${totalSec}초)`, accuracy);
    }

    // ==========================================
    // 공통 결과창 및 오답노트
    // ==========================================
    function showResult(modeName, rank, scoreStr, accuracy) {
        document.getElementById('top-nav').style.display = 'flex';
        showScreen('screen-result');
        
        let msg = '';
        if (gameDifficulty === 'extreme') {
            if (rank === 'SSR') msg = "경이로운 수준입니다. 사실상 원어민과 다를 바 없는 반응 속도입니다.";
            else if (rank === 'SR') msg = "압도적인 실력입니다. 페르시아어 단어의 뼈대를 완벽히 꿰뚫고 있습니다.";
            else if (rank === 'R') msg = "익스트림의 벽을 넘으셨군요. 대단한 집중력과 끈기입니다.";
            else msg = "한계에 부딪혔습니다. 일반 모드에서 기본기를 더 다지고 오십시오.";
        } else {
            if (rank === 'A+') msg = "🏆 완벽합니다! 원어민 수준의 암기력입니다.";
            else if (rank === 'A') msg = "👏 훌륭합니다! 단어의 달인이네요.";
            else if (rank === 'B') msg = "👍 준수합니다! 오답 노트만 확인해 보세요.";
            else msg = "💪 꾸준한 훈련이 정답입니다. 다시 도전!";
        }

        let certBox = document.getElementById('certificate');
        let badgeEl = document.getElementById('res-badge');
        
        if (gameDifficulty === 'extreme') {
            certBox.classList.add('extreme-mode');
            badgeEl.className = 'mode-badge badge-extreme';
            badgeEl.innerText = 'Extreme';
        } else {
            certBox.classList.remove('extreme-mode');
            badgeEl.className = 'mode-badge badge-normal';
            badgeEl.innerText = 'Normal';
        }

        document.getElementById('res-mode').innerText = modeName;
        document.getElementById('res-rank').innerText = rank;
        document.getElementById('res-msg').innerText = msg;
        document.getElementById('res-acc').innerText = `최종 정확도: ${accuracy}%`;
        document.getElementById('res-score').innerText = scoreStr;
        document.getElementById('res-stamp').innerText = `${getFormattedDate()} 인증됨`;

        let mistArea = document.getElementById('mistake-area');
        if (mistakes.length > 0) {
            mistArea.style.display = 'block';
            let html = mistakes.map(m => `<div class="mistake-item"><span>${m.p}</span> ${m.k}</div>`).join('');
            document.getElementById('mistake-list').innerHTML = html;
        } else {
            mistArea.style.display = 'none';
        }
    }

    // ==========================================
    // 단어 사전 리스트 및 플래시카드 연동
    // ==========================================
    let fcIndex = 0;
    let filteredDict = [];

    function renderDict() {
        filteredDict = [...wordData];
        document.getElementById('dict-count').innerText = filteredDict.length;
        const listDiv = document.getElementById('dict-list');
        listDiv.innerHTML = "";
        filteredDict.forEach((w, idx) => {
            let item = document.createElement('div');
            item.className = 'vocab-item';
            item.style.cursor = 'pointer'; 
            item.innerHTML = `<span class="vocab-per">${w.p}</span><span class="vocab-kor">${w.k}</span>`;
            item.onclick = () => openFlashcard(idx);
            listDiv.appendChild(item);
        });
    }

    function filterDict() {
        let q = document.getElementById('searchInput').value.toLowerCase();
        filteredDict = wordData.filter(w => w.p.includes(q) || w.k.includes(q));
        document.getElementById('dict-count').innerText = filteredDict.length;
        const listDiv = document.getElementById('dict-list');
        listDiv.innerHTML = "";
        filteredDict.forEach((w, idx) => {
            let item = document.createElement('div');
            item.className = 'vocab-item';
            item.style.cursor = 'pointer';
            item.innerHTML = `<span class="vocab-per">${w.p}</span><span class="vocab-kor">${w.k}</span>`;
            item.onclick = () => openFlashcard(idx);
            listDiv.appendChild(item);
        });
    }

    function shuffleDict() {
        for (let i = wordData.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [wordData[i], wordData[j]] = [wordData[j], wordData[i]];
        }
        filterDict(); 
    }

    function openFlashcard(idx) {
        fcIndex = idx;
        document.getElementById('flashcardModal').style.display = 'flex';
        updateFlashcard(); 
    }
    
    function closeFlashcard() { document.getElementById('flashcardModal').style.display = 'none'; }
    
    function toggleCard() { 
        const meanEl = document.getElementById('fcMean');
        if (meanEl.classList.contains('fc-content-hidden')) meanEl.classList.remove('fc-content-hidden');
        else meanEl.classList.add('fc-content-hidden');
    }
    
    function nextCard() { fcIndex = (fcIndex + 1) % filteredDict.length; updateFlashcard(); }
    function prevCard() { fcIndex = (fcIndex - 1 + filteredDict.length) % filteredDict.length; updateFlashcard(); }
    
    function updateFlashcard() {
        document.getElementById('fcPer').innerText = filteredDict[fcIndex].p;
        document.getElementById('fcPron').innerText = filteredDict[fcIndex].r ? `/${filteredDict[fcIndex].r}/` : '';
        document.getElementById('fcMean').innerText = filteredDict[fcIndex].k;
        document.getElementById('fcMean').classList.add('fc-content-hidden'); 
    }

    function downloadCSV() {
        if(!WORD_CSV_URL) {
            alert("다운로드할 수 있는 시트 링크가 설정되지 않았습니다.");
            return;
        }
        alert("⚠️ [필독 주의사항]\n\n다운받은 csv 파일을 더블클릭하여 엑셀로 열면 페르시아어가 100% 깨집니다.\n\n반드시 구글 스프레드시트를 열고 [파일] -> [가져오기] 메뉴를 통해 해당 파일을 여세요.");
        window.open(WORD_CSV_URL, '_blank');
    }
</script>
